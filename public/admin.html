<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JUMO Admin — Session Log</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: "DM Sans", system-ui, sans-serif; background: #05090F; color: #E2E8F0; font-size: 13px; display: flex; flex-direction: column; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: #1E3A5F; border-radius: 2px; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .anim { animation: fadeIn .2s ease; }

  .btn { background: #0A1628; border: 1px solid #1E3A5F; border-radius: 6px; color: #94A3B8; padding: 5px 12px; cursor: pointer; font-size: 11.5px; font-weight: 500; transition: all .15s; white-space: nowrap; font-family: inherit; }
  .btn:hover { background: #0F2040; color: #CBD5E1; border-color: #2D5F8A; }
  .btn-primary { background: #1E3A5F; border-color: #2D5F8A; color: #E2E8F0; }
  .btn-primary:hover { background: #2D5F8A; }
  .lbl { font-size: 9.5px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: #3A5A70; }

  /* Header */
  #hdr { height: 48px; border-bottom: 1px solid #0F2040; display: flex; align-items: center; padding: 0 16px; gap: 10px; flex-shrink: 0; }

  /* Auth overlay */
  #auth { position: fixed; inset: 0; background: #05090F; display: flex; align-items: center; justify-content: center; z-index: 100; }
  #auth-box { background: #070D18; border: 1px solid #1E3A5F; border-radius: 12px; padding: 28px 24px; width: 100%; max-width: 340px; }
  #auth-input { width: 100%; background: #040710; border: 1px solid #1E3A5F; border-radius: 6px; color: #E2E8F0; padding: 9px 12px; font-size: 13px; font-family: inherit; margin: 10px 0 14px; }
  #auth-input:focus { outline: none; border-color: #2D5F8A; }
  #auth-error { color: #EF4444; font-size: 12px; margin-top: 8px; display: none; }

  /* Layout */
  #body { flex: 1; display: flex; overflow: hidden; }
  #sidebar { width: 280px; min-width: 280px; border-right: 1px solid #0F2040; display: flex; flex-direction: column; overflow: hidden; }
  #filters { padding: 12px; border-bottom: 1px solid #0F2040; flex-shrink: 0; display: flex; flex-direction: column; gap: 7px; }
  #session-list { flex: 1; overflow-y: auto; padding: 6px; }
  #detail { flex: 1; overflow-y: auto; padding: 20px; }

  /* Filter controls */
  .filter-row { display: flex; gap: 6px; align-items: center; }
  select.f-sel { flex: 1; background: #070D18; border: 1px solid #0F2040; border-radius: 6px; color: #94A3B8; padding: 5px 8px; font-size: 11.5px; font-family: inherit; cursor: pointer; }
  select.f-sel:focus { outline: none; border-color: #1E3A5F; }

  /* Stats bar */
  #stats { padding: 10px 12px; border-bottom: 1px solid #0F2040; display: flex; gap: 14px; flex-shrink: 0; }
  .stat { text-align: center; }
  .stat-n { font-size: 18px; font-weight: 700; color: #E2E8F0; line-height: 1; }
  .stat-l { font-size: 9px; color: #3A5A70; margin-top: 2px; text-transform: uppercase; letter-spacing: .06em; }

  /* Session items */
  .s-item { padding: 9px 10px; border-radius: 8px; cursor: pointer; border: 1px solid transparent; margin-bottom: 2px; transition: all .12s; }
  .s-item:hover { background: #0A1628; }
  .s-item.active { background: #0A1628; border-color: #1E3A5F; }
  .s-name { font-size: 11.5px; font-weight: 600; color: #CBD5E1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .s-meta { font-size: 10px; color: #3A5A70; margin-top: 2px; }

  /* Detail */
  #detail-empty { color: #2A3A50; font-size: 12px; padding-top: 40px; text-align: center; }

  /* Persona colors */
  .p-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; display: inline-block; }

  /* Conversation bubbles */
  .bubble { max-width: 78%; border-radius: 8px; padding: 8px 12px; font-size: 12px; line-height: 1.65; white-space: pre-wrap; margin-bottom: 6px; }
  .bubble-user { background: #0F2040; border: 1px solid #1E3A5F; color: #94A3B8; margin-left: auto; }
  .bubble-asst { background: #0A1628; border: 1px solid #0F2040; color: #CBD5E1; }

  /* Broadcast response cards */
  .bc-resp { background: #070D18; border: 1px solid #0F2040; border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; }

  @media (max-width: 700px) {
    #sidebar { width: 100%; min-width: 100%; border-right: none; }
    #detail { display: none; }
    #body { flex-direction: column; }
  }
</style>
</head>
<body>

<!-- AUTH OVERLAY -->
<div id="auth">
  <div id="auth-box">
    <div style="font-family:'Georgia',serif;font-weight:700;font-size:18px;color:#4B7A8A;margin-bottom:4px">JUMO Admin</div>
    <div style="font-size:12px;color:#3A5A70;margin-bottom:2px">Session Log — All Testers</div>
    <input id="auth-input" type="password" placeholder="Admin token…" autocomplete="off">
    <button class="btn btn-primary" style="width:100%;padding:9px" onclick="tryAuth()">Sign In</button>
    <div id="auth-error">Wrong token. Try again.</div>
  </div>
</div>

<!-- HEADER -->
<div id="hdr">
  <div style="width:26px;height:26px;background:linear-gradient(135deg,#D4A017,#C0392B);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:white;flex-shrink:0">J</div>
  <span style="font-family:'Georgia',serif;font-weight:700;font-size:15px">JUMO</span>
  <span style="font-size:10px;color:#3A5A70;padding:2px 8px;border:1px solid #0F2040;border-radius:4px">Admin</span>
  <div style="flex:1"></div>
  <button class="btn" onclick="loadSessions()">&#x21BA; Refresh</button>
  <button class="btn" onclick="exportCSV()">&#x2913; CSV</button>
  <button class="btn" onclick="signOut()" style="color:#EF4444;border-color:#3A1A1A">Sign Out</button>
</div>

<!-- BODY -->
<div id="body">
  <div id="sidebar">
    <!-- Stats -->
    <div id="stats">
      <div class="stat"><div class="stat-n" id="stat-total">—</div><div class="stat-l">Total</div></div>
      <div class="stat"><div class="stat-n" id="stat-chat">—</div><div class="stat-l">Chats</div></div>
      <div class="stat"><div class="stat-n" id="stat-bc">—</div><div class="stat-l">Broadcasts</div></div>
      <div class="stat"><div class="stat-n" id="stat-testers">—</div><div class="stat-l">Testers</div></div>
    </div>
    <!-- Filters -->
    <div id="filters">
      <div class="lbl" style="margin-bottom:2px">Filters</div>
      <div class="filter-row">
        <select class="f-sel" id="f-type" onchange="applyFilters()">
          <option value="">All types</option>
          <option value="chat">Chat</option>
          <option value="broadcast">Broadcast</option>
          <option value="compare">Compare</option>
        </select>
        <select class="f-sel" id="f-persona" onchange="applyFilters()">
          <option value="">All personas</option>
        </select>
      </div>
      <div class="filter-row">
        <select class="f-sel" id="f-tester" onchange="applyFilters()">
          <option value="">All testers</option>
        </select>
        <button class="btn" onclick="clearFilters()" style="font-size:10px">Clear</button>
      </div>
    </div>
    <div id="session-list"><div style="padding:12px;color:#2A3A50;font-size:11.5px">Loading…</div></div>
  </div>

  <div id="detail">
    <div id="detail-empty">Select a session to review</div>
    <div id="detail-content" style="display:none"></div>
  </div>
</div>

<script>
var PERSONA_COLORS = {
  'marie-ange': '#F59E0B', 'lisette': '#34D399', 'jefte': '#F97316',
  'nadege': '#A5B4FC', 'dieunel': '#A3E635', 'sophonie': '#22D3EE',
  'kenzy': '#C084FC', 'jonas': '#60A5FA', 'roseline': '#F472B6',
  'marilene': '#2DD4BF'
};

var allSessions = [];
var filtered = [];
var adminToken = '';
var selectedId = null;

/* ── Auth ── */
function tryAuth() {
  var token = document.getElementById('auth-input').value.trim();
  if (!token) return;
  adminToken = token;
  loadSessions();
}

document.getElementById('auth-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') tryAuth();
});

function signOut() {
  adminToken = '';
  allSessions = [];
  filtered = [];
  document.getElementById('auth').style.display = 'flex';
  document.getElementById('auth-input').value = '';
  document.getElementById('auth-error').style.display = 'none';
}

/* ── Load sessions ── */
async function loadSessions() {
  if (!adminToken) return;
  document.getElementById('session-list').innerHTML = '<div style="padding:12px;color:#2A3A50;font-size:11.5px">Loading…</div>';

  try {
    var res = await fetch('/api/sessions?limit=500&token=' + encodeURIComponent(adminToken));
    if (res.status === 401) {
      document.getElementById('auth-error').style.display = 'block';
      return;
    }
    document.getElementById('auth').style.display = 'none';
    document.getElementById('auth-error').style.display = 'none';
    allSessions = await res.json();
    buildFilters();
    applyFilters();
    updateStats();
  } catch(e) {
    document.getElementById('session-list').innerHTML = '<div style="padding:12px;color:#EF4444;font-size:11.5px">Failed to load. Check connection.</div>';
  }
}

/* ── Filters ── */
function buildFilters() {
  var personas = {}, testers = {};
  allSessions.forEach(function(s) {
    if (s.persona_id) personas[s.persona_id] = s.persona_name;
    if (s.tester_id)  testers[s.tester_id] = s.tester_id.slice(0,8);
  });

  var pSel = document.getElementById('f-persona');
  pSel.innerHTML = '<option value="">All personas</option>';
  Object.keys(personas).sort().forEach(function(id) {
    pSel.innerHTML += '<option value="' + esc(id) + '">' + esc(personas[id] || id) + '</option>';
  });

  var tSel = document.getElementById('f-tester');
  tSel.innerHTML = '<option value="">All testers</option>';
  Object.keys(testers).forEach(function(id) {
    tSel.innerHTML += '<option value="' + esc(id) + '">…' + esc(testers[id]) + '</option>';
  });
}

function applyFilters() {
  var type    = document.getElementById('f-type').value;
  var persona = document.getElementById('f-persona').value;
  var tester  = document.getElementById('f-tester').value;

  filtered = allSessions.filter(function(s) {
    if (type    && s.type       !== type)    return false;
    if (persona && s.persona_id !== persona) return false;
    if (tester  && s.tester_id  !== tester)  return false;
    return true;
  });

  renderList();
}

function clearFilters() {
  document.getElementById('f-type').value = '';
  document.getElementById('f-persona').value = '';
  document.getElementById('f-tester').value = '';
  applyFilters();
}

/* ── Stats ── */
function updateStats() {
  var chats = allSessions.filter(function(s){ return s.type === 'chat'; }).length;
  var bcs   = allSessions.filter(function(s){ return s.type === 'broadcast'; }).length;
  var testers = new Set(allSessions.map(function(s){ return s.tester_id; }).filter(Boolean)).size;
  document.getElementById('stat-total').textContent   = allSessions.length;
  document.getElementById('stat-chat').textContent    = chats;
  document.getElementById('stat-bc').textContent      = bcs;
  document.getElementById('stat-testers').textContent = testers;
}

/* ── Render list ── */
function renderList() {
  var col = document.getElementById('session-list');
  if (!filtered.length) {
    col.innerHTML = '<div style="padding:12px;color:#2A3A50;font-size:11.5px">No sessions match the filter.</div>';
    return;
  }
  var html = '';
  filtered.forEach(function(s) {
    var color = (s.persona_id && PERSONA_COLORS[s.persona_id]) || '#3A5A70';
    var icon  = s.type === 'broadcast' ? '⊕' : s.type === 'compare' ? '⇔' : '▣';
    var count = s.type === 'broadcast'
      ? (s.broadcast_results ? Object.keys(s.broadcast_results).filter(function(k){ return s.broadcast_results[k].status === 'done'; }).length + '/10' : '0/10')
      : ((s.exchanges || []).length + ' msg');
    var noteIcon = s.researcher_notes ? ' 📝' : '';
    var tester = s.tester_id ? '…' + s.tester_id.slice(-8) : 'unknown';
    var dt = s.created_at ? new Date(s.created_at).toLocaleString([], {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : s.session_timestamp || '';
    html += '<div class="s-item' + (s.id === selectedId ? ' active' : '') + '" onclick="selectSession(\'' + esc(s.id) + '\')">' +
      '<div class="s-name" style="color:' + color + '">' + icon + ' ' + esc(s.persona_name || 'Unknown') + noteIcon + '</div>' +
      '<div class="s-meta">' + esc(dt) + ' &middot; ' + esc(count) + ' &middot; ' + esc(tester) + '</div>' +
    '</div>';
  });
  col.innerHTML = html;
}

/* ── Select session ── */
function selectSession(id) {
  selectedId = id;
  renderList();
  var s = allSessions.find(function(x){ return x.id === id; });
  if (!s) return;

  var color = (s.persona_id && PERSONA_COLORS[s.persona_id]) || '#3A5A70';
  var dt = s.created_at ? new Date(s.created_at).toLocaleString() : s.session_timestamp || '';

  var html = '<div class="anim">';

  // Header
  html += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">' +
    '<div style="width:36px;height:36px;border-radius:9px;background:' + color + '22;border:1px solid ' + color + '66;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">' +
    (s.type === 'broadcast' ? '⊕' : s.type === 'compare' ? '⇔' : '▣') + '</div>' +
    '<div><div style="font-size:14px;font-weight:600;color:#E2E8F0">' + esc(s.persona_name || 'Unknown') + '</div>' +
    '<div style="font-size:10.5px;color:#3A5A70">' + esc(dt) + ' &middot; Tester: ' + esc(s.tester_id ? '…' + s.tester_id.slice(-8) : 'unknown') + '</div>' +
    '</div></div>';

  // Researcher notes
  if (s.researcher_notes) {
    html += '<div style="background:#040710;border:1px solid #1E3A5F;border-radius:7px;padding:10px 12px;margin-bottom:16px">' +
      '<div class="lbl" style="margin-bottom:5px">Researcher Notes</div>' +
      '<div style="font-size:12px;color:#94A3B8;line-height:1.6;white-space:pre-wrap">' + esc(s.researcher_notes) + '</div>' +
    '</div>';
  }

  // Broadcast
  if (s.type === 'broadcast') {
    html += '<div style="font-size:13px;font-weight:600;color:#E2E8F0;margin-bottom:14px;line-height:1.4">' + esc(s.broadcast_question || '') + '</div>';
    var results = s.broadcast_results || {};
    Object.keys(results).forEach(function(pid) {
      var r = results[pid];
      if (!r || r.status !== 'done') return;
      var c = PERSONA_COLORS[pid] || '#3A5A70';
      html += '<div class="bc-resp" style="border-left:3px solid ' + c + '">' +
        '<div style="font-size:10.5px;font-weight:600;color:' + c + ';margin-bottom:6px">' + esc(pid) + '</div>' +
        '<div style="font-size:12px;color:#94A3B8;line-height:1.65;white-space:pre-wrap">' + esc(r.text || '') + '</div>' +
      '</div>';
    });
  } else {
    // Chat
    var exchanges = s.exchanges || [];
    if (!exchanges.length) {
      html += '<div style="color:#2A3A50;font-size:11.5px">No messages recorded.</div>';
    }
    exchanges.forEach(function(e) {
      var isUser = e.role === 'user';
      html += '<div style="display:flex;justify-content:' + (isUser ? 'flex-end' : 'flex-start') + '">' +
        '<div class="bubble ' + (isUser ? 'bubble-user' : 'bubble-asst') + '" style="' + (!isUser ? 'border-left:3px solid ' + color + ';' : '') + '">' +
        esc(e.content) + '</div></div>';
    });
  }

  html += '</div>';

  document.getElementById('detail-empty').style.display = 'none';
  document.getElementById('detail-content').style.display = 'block';
  document.getElementById('detail-content').innerHTML = html;
}

/* ── CSV Export ── */
function csvCell(v) {
  var s = String(v === null || v === undefined ? '' : v).replace(/\r?\n/g, ' ').replace(/"/g, '""');
  if (s.search(/[,"]/) !== -1) s = '"' + s + '"';
  return s;
}

function exportCSV() {
  if (!allSessions.length) { alert('No sessions to export.'); return; }
  var rows = [['Type','Session ID','Date','Persona','Persona ID','Tester','Role','Content','Notes'].join(',')];
  allSessions.forEach(function(s) {
    var dt = s.created_at ? new Date(s.created_at).toLocaleString() : s.session_timestamp || '';
    var tester = s.tester_id ? s.tester_id.slice(-8) : '';
    var note = s.researcher_notes || '';
    if (s.type === 'broadcast') {
      rows.push([csvCell('broadcast'), csvCell(s.id), csvCell(dt), csvCell('All 10'), '', csvCell(tester), csvCell('QUESTION'), csvCell(s.broadcast_question || ''), csvCell(note)].join(','));
      var results = s.broadcast_results || {};
      Object.keys(results).forEach(function(pid) {
        var r = results[pid];
        if (!r || r.status !== 'done') return;
        rows.push([csvCell('broadcast'), csvCell(s.id), csvCell(dt), csvCell(pid), csvCell(pid), csvCell(tester), csvCell('response'), csvCell(r.text || ''), ''].join(','));
      });
    } else {
      var exchanges = s.exchanges || [];
      if (!exchanges.length) {
        rows.push([csvCell(s.type), csvCell(s.id), csvCell(dt), csvCell(s.persona_name || ''), csvCell(s.persona_id || ''), csvCell(tester), '', '', csvCell(note)].join(','));
      }
      exchanges.forEach(function(e, j) {
        rows.push([csvCell(s.type), csvCell(s.id), csvCell(dt), csvCell(s.persona_name || ''), csvCell(s.persona_id || ''), csvCell(tester), csvCell(e.role), csvCell(e.content), j === 0 ? csvCell(note) : ''].join(','));
      });
    }
  });
  var csv = '\uFEFF' + rows.join('\n');
  var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'jumo-admin-' + new Date().toISOString().slice(0,10) + '.csv'; a.click();
  URL.revokeObjectURL(url);
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
